<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Enhorabuena</title>
    <link rel="stylesheet" href="resolucion.css">
</head>
<body>
  <div class="container">
    <h1>¡Habéis completado la segunda parte!</h1>
    <h1>Reproducid el video</h1>
    
    <div class="video-wrapper">
      <video id="video" class="video" controls playsinline webkit-playsinline>
        <source src="resolucion.mp4" type="video/mp4">
        Tu navegador no soporta la etiqueta de video.
      </video>
    </div>
    
    <h1>Escribid aquí el nombre del personaje histórico</h1>
    
    <!-- Campo de texto para la respuesta -->
    <input type="text" id="respuestaInput" placeholder="Escribe aquí..." autocomplete="off" autocorrect="off" autocapitalize="characters">
    
    <!-- Botón de validar -->
    <button id="validarButton">VALIDAR</button>
    
    <!-- Contenedor para mensajes de validación -->
    <div id="mensajeValidacion"></div>
  </div>

  <script src="resolucion.js"></script>
</body>
</html>
