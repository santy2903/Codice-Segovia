<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El código secreto de Segovia</title>
    <link rel="stylesheet" href="instrucciones.css">
</head>
<body>
  <div class="container">
    <h1>Antes de seguir, mirad el vídeo de Instrucciones del Juego</h1>
    <div class="video-wrapper">
      <video id="video" class="video" preload="metadata" playsinline>
        <source src="videoinstrucciones.mp4" type="video/mp4">

      </video>
      <button id="playButton" class="play-button" aria-label="Reproducir video">
        <svg viewBox="0 0 24 24" width="48" height="48">
          <path fill="white" d="M8 5v14l11-7z"/>
        </svg>
      </button>
    </div>
    <button id="mapaButton">Ir al Mapa</button>
  </div>

  <script src="instrucciones.js"></script>

</html>
