<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>El código secreto de Segovia</title>
    <link rel="stylesheet" href="instrucciones.css">
</head>
<body>
    <div class="container">
        <h1>Antes de seguir, mirad el vídeo de Instrucciones del Juego</h1>

        <!-- Contenedor de replay (aparece después de que termina el video) -->
        <div class="replay-container" id="replayContainer" style="display: none;">
            <button class="replay-button" id="replayButton">
                <div class="replay-play-icon"></div>
            </button>
            <p class="replay-message">Volver a ver el video</p>
        </div>

        <!-- Botón para ir al mapa (siempre visible) -->
        <button id="mapaButton">Ir al Mapa</button>
    </div>

    <!-- Video en pantalla completa (overlay) -->
    <div id="fullscreenVideoOverlay" class="fullscreen-overlay" style="display: none;">
        <video id="fullscreenVideo" class="fullscreen-video" playsinline preload="auto"></video>
    </div>

    <script src="instrucciones.js"></script>
</body>
</html>
