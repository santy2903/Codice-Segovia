<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>El código secreto de Segovia</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Enlace al manifiesto PWA -->
    <link rel="manifest" href="/Codice-Segovia/manifest.json">
    
    <!-- Metaetiquetas para iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Códice Segovia">
</head>
<body>
    <div class="container">
        <h1>El Códice Secreto de Segovia</h1>
        <button id="start-button" onclick="location.href='instrucciones.html'">Comienza la aventura</button>
    </div>
    
    <!-- Registro del Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/Codice-Segovia/sw.js')
                .then(reg => console.log('Service Worker registrado correctamente', reg))
                .catch(err => console.error('Error al registrar el Service Worker:', err));
        }
    </script>
</body>
</html>
