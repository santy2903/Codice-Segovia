<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enhorabuena</title>
    <style>
        /* === RESET Y ESTILOS GLOBALES (optimizado para móvil) === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            background-color: black;
            background-image: url('fondo.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            justify-content: center;
            align-items: center;
        }

        /* Fondo específico para móviles */
        @media (max-width: 768px) {
            body {
                background-image: url('fondomovile.jpeg');
                background-size: cover;
            }
        }

        /* Contenedor principal: ocupa el ancho completo con buen padding */
        .container {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(2px);
            width: 100%;
            max-width: 500px;
            padding: 20px 16px 28px;
            border-radius: 28px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            margin: auto;
        }

        h1 {
            font-size: clamp(1.4rem, 6vw, 2rem);
            line-height: 1.3;
            text-shadow: 0 2px 6px black;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin: 0;
            width: 100%;
        }

        /* Contenedor del video: mantiene relación de aspecto 16:9 */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            background-color: #111;
        }

        .video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            background: #000;
        }

        /* Botón de play circular superpuesto */
        .custom-play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background-color 0.2s;
            z-index: 15;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-play-button:hover {
            background-color: #ffffff;
            transform: translate(-50%, -50%) scale(1.05);
        }

        .custom-play-button:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 16px 0 16px 28px;
            border-color: transparent transparent transparent #ff5733;
            margin-left: 6px;
        }

        .video-wrapper.playing .custom-play-button {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* Mensaje del guardian con la nueva frase */
        .guardian-message {
            font-size: 1.2rem;
            font-weight: 500;
            background: rgba(255, 87, 51, 0.25);
            padding: 16px 14px;
            border-radius: 60px;
            border-left: 4px solid #ff5733;
            border-right: 4px solid #ff5733;
            width: 100%;
            text-align: center;
            color: #fff;
            text-shadow: 0 1px 4px black;
            line-height: 1.5;
        }

        /* Caja de texto para la contraseña */
        .password-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 6px;
        }

        .password-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 60px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(5px);
            color: white;
            text-align: center;
            letter-spacing: 2px;
            border: 2px solid rgba(255,87,51,0.6);
            outline: none;
            transition: border 0.2s;
        }

        .password-input:focus {
            border-color: #ff5733;
            background: rgba(255,255,255,0.25);
        }

        .password-input::placeholder {
            color: rgba(255,255,255,0.6);
            font-size: 1rem;
            letter-spacing: normal;
        }

        /* Botón continuar (inicialmente deshabilitado) */
        #mapaButton {
            font-size: 1.8rem;
            font-weight: bold;
            padding: 16px 20px;
            width: 100%;
            cursor: pointer;
            border: none;
            background-color: #ff5733;
            color: white;
            border-radius: 60px;
            transition: background-color 0.2s, opacity 0.2s;
            margin-top: 8px;
            box-shadow: 0 6px 0 #a13e1f;
            opacity: 0.6;
            pointer-events: none;
        }

        #mapaButton.enabled {
            opacity: 1;
            pointer-events: auto;
            background-color: #ff5733;
        }

        #mapaButton.enabled:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #a13e1f;
        }

        #mapaButton.enabled:hover {
            background-color: #ff6f4a;
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 400px) {
            .container {
                padding: 16px 12px 20px;
            }
            .custom-play-button {
                width: 60px;
                height: 60px;
            }
            .play-icon {
                border-width: 12px 0 12px 22px;
            }
            .guardian-message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Habeis resuelto la primera parte del Códice. ✨</h1>
        <h1>✨ Reproducir el video. ✨</h1>

        <!-- Wrapper de video con botón de play personalizado -->
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" class="video" playsinline preload="metadata">
                <source src="despues11.mp4" type="video/mp4">
                Tu navegador no soporta la etiqueta de video.
            </video>
            <!-- Botón de play redondo -->
            <button class="custom-play-button" id="customPlayBtn" aria-label="Reproducir video">
                <div class="play-icon"></div>
            </button>
        </div>

        <!-- Mensaje del guardian con la nueva frase (sin pista) -->
        <div class="guardian-message">
            ⚡ Antes de continuar, hablad con el Guardián ⚡<br>
            <span style="font-size: 0.95em; opacity: 0.9;">La contraseña para seguir, os la dará él</span>
        </div>

        <!-- Cuadro de texto para contraseña + botón continuar -->
        <div class="password-box">
            <input type="text" class="password-input" id="passwordInput" placeholder="🔒 Introducir contraseña" autocomplete="off">
            <button id="mapaButton">Continuar</button>
        </div>
    </div>

    <script>
        (function() {
            document.addEventListener('DOMContentLoaded', function() {
                // Elementos
                const video = document.getElementById('video');
                const wrapper = document.getElementById('videoWrapper');
                const customPlayBtn = document.getElementById('customPlayBtn');
                const mapaButton = document.getElementById('mapaButton');
                const passwordInput = document.getElementById('passwordInput');

                // --- LÓGICA DE VIDEO: PLAY FULLSCREEN Y OCULTAR BOTÓN ---
                if (video && wrapper && customPlayBtn) {
                    function updatePlayButtonVisibility() {
                        if (video.paused) {
                            wrapper.classList.remove('playing');
                        } else {
                            wrapper.classList.add('playing');
                        }
                    }

                    customPlayBtn.addEventListener('click', async function(e) {
                        e.stopPropagation();
                        try {
                            await video.play();
                            
                            if (video.requestFullscreen) {
                                video.requestFullscreen();
                            } else if (video.webkitEnterFullscreen) {
                                video.webkitEnterFullscreen();
                            } else if (video.webkitRequestFullscreen) {
                                video.webkitRequestFullscreen();
                            } else if (video.mozRequestFullScreen) {
                                video.mozRequestFullScreen();
                            } else if (video.msRequestFullscreen) {
                                video.msRequestFullscreen();
                            }
                            
                            updatePlayButtonVisibility();
                        } catch (err) {
                            console.warn('Error al reproducir en fullscreen:', err);
                            try { await video.play(); } catch (e) {}
                            updatePlayButtonVisibility();
                        }
                    });

                    document.addEventListener('fullscreenchange', function() {
                        if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement) {
                            updatePlayButtonVisibility();
                        }
                    });

                    video.addEventListener('play', function() {
                        wrapper.classList.add('playing');
                    });
                    video.addEventListener('pause', function() {
                        wrapper.classList.remove('playing');
                    });

                    video.addEventListener('ended', function() {
                        if (document.exitFullscreen) {
                            document.exitFullscreen().catch(err => console.warn);
                        } else if (document.webkitExitFullscreen) {
                            document.webkitExitFullscreen();
                        } else if (document.mozCancelFullScreen) {
                            document.mozCancelFullScreen();
                        } else if (document.msExitFullscreen) {
                            document.msExitFullscreen();
                        }
                        wrapper.classList.remove('playing');
                    });

                    updatePlayButtonVisibility();
                    video.addEventListener('pause', updatePlayButtonVisibility);
                }

                // --- LÓGICA DE CONTRASEÑA (SIN DISTINGUIR MAYÚSCULAS) Y BOTÓN CONTINUAR ---
                const CORRECT_PASSWORD = 'Segovia';

                function checkPasswordAndEnableButton() {
                    const entered = passwordInput.value.trim();
                    // Comparación case-insensitive
                    if (entered.localeCompare(CORRECT_PASSWORD, undefined, { sensitivity: 'base' }) === 0) {
                        mapaButton.classList.add('enabled');
                    } else {
                        mapaButton.classList.remove('enabled');
                    }
                }

                passwordInput.addEventListener('input', checkPasswordAndEnableButton);
                passwordInput.addEventListener('blur', checkPasswordAndEnableButton);

                mapaButton.classList.remove('enabled');

                mapaButton.addEventListener('click', function(e) {
                    if (!mapaButton.classList.contains('enabled')) {
                        e.preventDefault();
                        e.stopPropagation();
                        // Feedback visual de error
                        passwordInput.style.borderColor = '#ff3333';
                        setTimeout(() => passwordInput.style.borderColor = 'rgba(255,87,51,0.6)', 300);
                        return;
                    }
                    window.location.href = 'criptex.html';
                });

                passwordInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        checkPasswordAndEnableButton();
                        if (mapaButton.classList.contains('enabled')) {
                            mapaButton.click();
                        }
                    }
                });

                passwordInput.setAttribute('autocomplete', 'off');
            });
        })();
    </script>
</body>
</html>
